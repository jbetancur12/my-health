<svg width="512" height="512" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo azul redondeado -->
  <rect width="64" height="64" rx="16" fill="#155DFC"/>

  <!-- Marco del calendario -->
  <rect x="10" y="18" width="44" height="37" rx="5"
        fill="white" fill-opacity="0.08"
        stroke="white" stroke-width="2.5"/>

  <!-- Argollas del calendario -->
  <line x1="21" y1="12" x2="21" y2="22"
        stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="43" y1="12" x2="43" y2="22"
        stroke="white" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Línea ECG / pulso en el encabezado -->
  <path d="M10 24.5 L16 24.5 L19 19 L23 30 L26 20 L29 24.5 L54 24.5"
        stroke="white" stroke-width="2.2"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Separador encabezado / cuerpo -->
  <line x1="10" y1="31" x2="54" y2="31"
        stroke="white" stroke-width="1.5" stroke-opacity="0.25"/>

  <!-- Puntos de fechas — fila 1 -->
  <circle cx="19" cy="40" r="2.5" fill="white" fill-opacity="0.7"/>
  <circle cx="28" cy="40" r="2.5" fill="white" fill-opacity="0.7"/>
  <circle cx="37" cy="40" r="2.5" fill="white" fill-opacity="0.7"/>
  <circle cx="46" cy="40" r="2.5" fill="white" fill-opacity="0.35"/>

  <!-- Puntos de fechas — fila 2 -->
  <circle cx="19" cy="49" r="2.5" fill="white" fill-opacity="0.35"/>
  <!-- Hoy (destacado) -->
  <circle cx="28" cy="49" r="3.5" fill="white"/>
  <circle cx="37" cy="49" r="2.5" fill="white" fill-opacity="0.35"/>
  <circle cx="46" cy="49" r="2.5" fill="white" fill-opacity="0.7"/>
</svg>
