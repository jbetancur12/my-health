name: citasmedicas

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - backend

  minio:
    image: quay.io/minio/minio:RELEASE.2025-06-13T11-33-47Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    networks:
      - backend

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    environment:
      NODE_ENV: production
      PORT: 3001
      CLIENT_ORIGIN: ${CLIENT_ORIGIN}
      DATABASE_URL: ${DATABASE_URL}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_PORT: ${MINIO_PORT}
      MINIO_USE_SSL: ${MINIO_USE_SSL}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_REGION: ${MINIO_REGION}
      MINIO_BUCKET_PREFIX: ${MINIO_BUCKET_PREFIX}
      MINIO_ENABLE_VERSIONING: ${MINIO_ENABLE_VERSIONING}
      AI_SUMMARY_PROVIDER: ${AI_SUMMARY_PROVIDER}
      AI_SUMMARY_MAX_FILE_BYTES: ${AI_SUMMARY_MAX_FILE_BYTES}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_SUMMARY_MODEL: ${OPENAI_SUMMARY_MODEL}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_SUMMARY_MODEL: ${GEMINI_SUMMARY_MODEL}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/health').then((response)=>{if(!response.ok)process.exit(1)}).catch(()=>process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - backend
      - frontend

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-8080}:80"
    networks:
      - frontend

volumes:
  postgres-data:
  minio-data:

networks:
  backend:
  frontend:
